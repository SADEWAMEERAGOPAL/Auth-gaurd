
<button mat-raised-button color="primary" routerLink="addproduct">Add Product</button>
<div class="row">
    <div class="col-md-4 ">
        <ul class="list-group">
            <li class="list-group-item" *ngFor="let p of productArr" [routerLink]="p.pid"
            [queryParams]="{
                Cr: p.canReturn
            }">
                {{ p.name }}
            </li>
        </ul>
    </div>

    <div class="col-md-8">
        <router-outlet></router-outlet>
    </div>
</div>
